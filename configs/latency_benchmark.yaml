data:
  corpus_path: artifacts/msmarco_passage_quickstart/corpus.jsonl
  queries_path: artifacts/msmarco_passage_quickstart/queries.dev.jsonl
  candidate_run_path: results/faiss_run.json
  faiss_index_path: artifacts/msmarco_passage_quickstart/faiss/index.flatip
  faiss_ids_path: artifacts/msmarco_passage_quickstart/passage_ids.json

bm25:
  top_k: 5
  k1: 1.5
  b: 0.75

faiss:
  model_name_or_path: checkpoints/biencoder_quickstart
  query_prefix: ""
  batch_size: 1
  normalize_embeddings: true
  top_k: 5
  use_cpu: false

cross_encoder:
  model_name_or_path: checkpoints/cross_encoder_quickstart
  max_length: 256
  num_labels: 1
  batch_size: 8
  top_k: 5
  use_cpu: false

colbert:
  model_name_or_path: sentence-transformers/all-MiniLM-L6-v2
  max_length: 128
  batch_size: 8
  top_k: 5
  query_prefix: ""
  passage_prefix: ""
  use_cpu: false

tf_student:
  model_name_or_path: checkpoints/tf_student_quickstart
  max_length: 256
  num_labels: 1
  from_pt: false
  use_safetensors: false
  batch_size: 8
  top_k: 5

benchmark:
  warmup_iterations: 1
  iterations: 3
  output_path: results/latency_benchmark.json

mlflow:
  enabled: true
  tracking_uri: artifacts/mlruns
  experiment_name: custom-rag-pipeline
  run_name: latency-benchmark
