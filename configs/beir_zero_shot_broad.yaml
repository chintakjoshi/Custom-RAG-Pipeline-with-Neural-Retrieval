dataset:
  names:
    - scifact
    - fiqa
    - trec-covid
  split: test
  download: true
  root_dir: artifacts/beir/datasets

model:
  model_name_or_path: sentence-transformers/all-MiniLM-L6-v2
  max_length: 256
  query_prefix: ""
  passage_prefix: ""
  use_cpu: false

retrieval:
  score_function: cos_sim
  batch_size: 16
  corpus_chunk_size: 2048
  k_values: [1, 3, 5, 10, 100]
  report_k: 10
  show_progress_bar: true

outputs:
  output_dir: results/beir_zero_shot/broad_minilm
  summary_json_path: results/beir_zero_shot/broad_minilm_summary.json
  summary_markdown_path: results/beir_zero_shot/broad_minilm_summary.md
