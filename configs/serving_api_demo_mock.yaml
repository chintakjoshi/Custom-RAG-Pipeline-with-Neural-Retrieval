data:
  corpus_path: artifacts/msmarco_passage_quickstart/corpus.jsonl
  faiss_index_path: artifacts/msmarco_passage_quickstart/faiss/index.flatip
  faiss_ids_path: artifacts/msmarco_passage_quickstart/passage_ids.json

retrieval:
  model_name_or_path: checkpoints/biencoder_quickstart
  query_prefix: ""
  batch_size: 8
  normalize_embeddings: true
  top_k: 5
  use_cpu: true

reranking:
  model_name_or_path: checkpoints/cross_encoder_quickstart
  max_length: 256
  num_labels: 1
  batch_size: 8
  top_k: 3
  use_cpu: true

generator:
  enabled: true
  base_url: http://127.0.0.1:11435
  model: phi3:mini
  timeout_seconds: 60
  strict_model_check: true
  validate_on_startup: true
  preview_only: false
  system_prompt: >-
    You are a grounded retrieval assistant. Use only the provided passages and
    never invent facts that are not explicitly supported by them.
  options:
    temperature: 0

prompt:
  unknown_response: I don't know.
