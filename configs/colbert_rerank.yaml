data:
  corpus_path: artifacts/msmarco_passage_quickstart/corpus.jsonl
  queries_path: artifacts/msmarco_passage_quickstart/queries.dev.jsonl
  candidate_run_path: results/cross_encoder_reranked_run.json

model:
  model_name_or_path: sentence-transformers/all-MiniLM-L6-v2
  max_length: 128
  query_prefix: ""
  passage_prefix: ""

inference:
  batch_size: 8
  top_k: 5
  use_cpu: false
  run_output_path: results/colbert_reranked_run.json

mlflow:
  enabled: true
  tracking_uri: artifacts/mlruns
  experiment_name: custom-rag-pipeline
  run_name: colbert-rerank
