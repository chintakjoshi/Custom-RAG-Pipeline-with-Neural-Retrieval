data:
  corpus_path: artifacts/msmarco_passage_quickstart/corpus.jsonl
  queries_path: artifacts/msmarco_passage_quickstart/queries.dev.jsonl
  candidate_run_path: results/faiss_run.json

model:
  model_name_or_path: checkpoints/cross_encoder_quickstart
  max_length: 256
  num_labels: 1

inference:
  batch_size: 16
  top_k: 5
  use_cpu: false
  show_progress_bar: true
  run_output_path: results/cross_encoder_reranked_run.json

mlflow:
  enabled: true
  tracking_uri: artifacts/mlruns
  experiment_name: custom-rag-pipeline
  run_name: cross-encoder-rerank
