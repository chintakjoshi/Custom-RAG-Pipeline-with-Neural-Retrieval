data:
  train_pairs_path: artifacts/msmarco_passage_quickstart/cross_encoder_train_pairs.jsonl

model:
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  max_length: 256
  num_labels: 1

training:
  output_dir: checkpoints/cross_encoder_quickstart
  train_batch_size: 2
  epochs: 1
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.0
  use_cpu: false
  show_progress_bar: true

mlflow:
  enabled: true
  tracking_uri: artifacts/mlruns
  experiment_name: custom-rag-pipeline
  run_name: cross-encoder-train
